version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/html:/usr/share/nginx/html
    depends_on:
      - api

  api:
    build: .
    command: python app.py
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      - redis

  worker:
    build: .
    command: python worker.py
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      - redis

  redis:
    image: redis:7