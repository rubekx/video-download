version: "3.9"

services:
  api:
    build: .
    command: python app.py
    ports:
      - "5000:5000"
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      - redis

  worker:
    build: .
    command: python worker.py
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"