<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Video Downloader</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h2>🎬 Video Downloader</h2>

    <input id="url" placeholder="Cole o link do YouTube, Instagram, etc" oninput="debounceFetchInfo()" />

    <select id="resolution" style="display: none;">
    </select>

    <button id="btn-download" onclick="startDownload()" style="display: none; margin-top: 10px;">Baixar</button>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <div class="info" id="info">Aguardando...</div>

    <div class="download-link" id="download">
      <a id="fileLink" href="#" download>⬇️ Baixar arquivo</a>
    </div>
  </div>
  <script src="index.js"></script>
</body>

</html>
